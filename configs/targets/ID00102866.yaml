target:
  code: "ID00102866"
  name: "冶金焦"
  description: "冶金焦炭：一级：A＜12.5，S＜0.65，MT＜7，CSR＞65，M＜8：山西产：出库价格指数：日照港（日）"

data:
  min_train_samples: 300        # 最小训练样本数

# 特征构建
feature_builder: "ID00102866"   # 使用 src/features/targets/ID00102866_features.py

# 当前使用的模型
active_model: "lgbm"            # lgbm/sarima/ensemble

# LGBM模型配置
lgbm:
  data:
    years: 2                    # 使用最近2年数据
  best_params:
    n_estimators: 150
    learning_rate: 0.03
    max_depth: 6
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8

# SARIMA模型配置
sarima:
  data:
    years: 1                    # 使用最近1年数据（最优配置）
  search_params:
    s: 30                       # 季节周期：月度周期（最优配置，MAPE: 1.4092%）
  best_params:
    order: [1, 1, 1]
    seasonal_order: [1, 0, 1, 30]

prediction:
  horizon_days: 30
  n_predictions: 50             # 预测50天
